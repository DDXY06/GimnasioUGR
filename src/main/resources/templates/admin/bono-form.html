<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title th:text="${esNuevo ? 'Nuevo Bono' : 'Editar Bono'} + ' - UGRFit'"></title>

    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css?family=Merriweather+Sans:400,700" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Merriweather:400,300,300italic,400italic,700,700italic" rel="stylesheet" type="text/css" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <style>
        .divider-start { border-top: 3px solid #0d6efd; opacity: 1; }
        .card { border: none; }
    </style>
</head>
<body id="page-top" class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top py-3" id="mainNav">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand text-primary fw-bold" th:href="@{/admin/index}">
            <i class="bi-shield-lock me-2"></i>UGRFit | Panel de Administración
        </a>
        <button class="navbar-toggler navbar-toggler-right" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto my-2 my-lg-0">
                <li class="nav-item">
                    <a class="nav-link text-primary fw-semibold" th:href="@{/admin/bonos}">
                        <i class="bi-ticket-detailed me-1"></i>Bonos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" th:href="@{/admin/index}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" th:href="@{/logout}">
                        <i class="bi-box-arrow-right me-1"></i>Cerrar Sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-section mt-5 pt-5">
    <div class="container px-4 px-lg-5">

        <div class="mb-4">
            <h2 class="mt-0 mb-1" th:text="${esNuevo ? 'Nuevo Bono' : 'Editar Bono'}"></h2>
            <p class="text-muted mb-0">Gestiona los bonos asignados a los clientes del gimnasio.</p>
        </div>
        <hr class="divider divider-start mb-5" style="max-width: 5rem; margin-left: 0;" />

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <form th:action="@{/admin/bonos/guardar}" th:object="${bono}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="row g-4">

                                <!-- Sección: Cliente -->
                                <div class="col-12">
                                    <h5 class="text-primary mb-3"><i class="bi-person-vcard me-2"></i>Cliente Asociado</h5>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-semibold text-muted">Cliente</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi-person"></i></span>

                                        <select th:if="${esNuevo}" th:field="*{usuarioId}" class="form-select border-0 bg-light" required>
                                            <option value="" disabled selected>Seleccionar cliente...</option>
                                            <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nombre} + ' (' + ${c.dni} + ')'"></option>
                                        </select>

                                        <th:block th:unless="${esNuevo}">
                                            <input type="text" class="form-control border-0 bg-light" th:value="*{nombreCliente}" readonly disabled>
                                            <input type="hidden" th:field="*{usuarioId}">
                                        </th:block>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('usuarioId')}" th:errors="*{usuarioId}"></div>
                                </div>

                                <!-- Sección: Detalles del Bono -->
                                <div class="col-12 mt-3">
                                    <h5 class="text-primary mb-3"><i class="bi-ticket-detailed me-2"></i>Detalles del Bono</h5>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-muted">Tipo de Bono</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi-card-list"></i></span>
                                        <select th:field="*{tipo}" class="form-select border-0 bg-light" required>
                                            <option value="" disabled selected>Selecciona un tipo...</option>
                                            <option th:each="t : ${tiposBonos}" th:value="${t}" th:text="${t}"></option>
                                        </select>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-muted">Cupos Máximos</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi-123"></i></span>
                                        <input type="number" th:field="*{maxCupos}" class="form-control border-0 bg-light" placeholder="Ej: 10" min="1" required>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('maxCupos')}" th:errors="*{maxCupos}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-muted">Fecha de Compra</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="bi-calendar-event"></i></span>
                                        <input type="date" th:field="*{fechaCompra}" class="form-control border-0 bg-light" readonly>
                                    </div>
                                </div>

                            </div>

                            <!-- Botones -->
                            <div class="mt-5 pt-3 border-top d-flex justify-content-end gap-3">
                                <a th:href="@{/admin/bonos}" class="btn btn-light px-4 rounded-pill">
                                    Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary px-5 rounded-pill shadow-sm">
                                    <i class="bi-check-lg me-2"></i>Guardar Cambios
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="bg-white py-4 mt-5">
    <div class="container px-4 px-lg-5 text-center">
        <div class="small text-muted">Copyright &copy; 2026 - UGRFit Administración</div>
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
