<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Gestionar Clientes de la Clase - UGRFit</title>

    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css?family=Merriweather+Sans:400,700" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Merriweather:400,300,300italic,400italic,700,700italic" rel="stylesheet" type="text/css" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <style>
        .divider-start { border-top: 3px solid #0d6efd; opacity: 1; }
        .card { border: none; }
    </style>
</head>
<body id="page-top" class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top py-3" id="mainNav">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand text-primary fw-bold" th:href="@{/admin/index}">
            <i class="bi-shield-lock me-2"></i>UGRFit | Panel de Administración
        </a>
        <button class="navbar-toggler navbar-toggler-right" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto my-2 my-lg-0">
                <li class="nav-item">
                    <a class="nav-link text-primary fw-semibold" th:href="@{/admin/clases/}">
                        <i class="bi-calendar-event me-1"></i>Clases
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" th:href="@{/admin/index}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" th:href="@{/logout}">
                        <i class="bi-box-arrow-right me-1"></i>Cerrar Sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-section mt-5 pt-5">
    <div class="container px-4 px-lg-5">

        <div class="mb-4">
            <h2 class="mt-0 mb-1">Gestionar Clientes - Clase #<span th:text="${clase.id}"></span></h2>
            <p class="text-muted mb-0" th:text="${clase.nombreDeporte + ' - ' + clase.fecha + ' ' + clase.hora}"></p>
        </div>
        <hr class="divider divider-start mb-5" style="max-width: 5rem; margin-left: 0;" />

        <div th:if="${exito}" class="alert alert-success alert-dismissible shadow-sm rounded-3" role="alert">
            <i class="bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible shadow-sm rounded-3" role="alert">
            <i class="bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="card shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4"><i class="bi-person-plus text-primary me-2"></i>Añadir Cliente</h5>
                        <form th:action="@{/admin/clases/{id}/clientes/add(id=${clase.id})}" method="post">
                            <div class="mb-4">
                                <label for="clienteId" class="form-label text-muted small fw-semibold">Seleccionar Cliente</label>
                                <select class="form-select" id="clienteId" name="clienteId" required>
                                    <option value="" disabled selected>Elige un cliente disponible...</option>
                                    <option th:each="cliente : ${clientesDisponibles}"
                                            th:value="${cliente.id}"
                                            th:text="${cliente.nombre + ' (' + cliente.dni + ')'}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary rounded-pill w-100 py-2">
                                Inscribir Cliente
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                    <h5 class="fw-bold mb-0">Clientes Inscritos</h5>
                </div>

                <div class="card shadow rounded-4 overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-dark">
                            <tr>
                                <th class="py-3 px-4">Nombre</th>
                                <th class="py-3">DNI</th>
                                <th class="py-3 text-center pe-4">Acción</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="cliente : ${clientesInscritos}">
                                <td class="px-4 fw-semibold" th:text="${cliente.nombre}"></td>
                                <td th:text="${cliente.dni}"></td>
                                <td class="text-center pe-4">
                                    <form th:action="@{/admin/clases/{idClase}/clientes/remove/{idCliente}(idClase=${clase.id}, idCliente=${cliente.id})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3" title="Quitar de la clase"
                                                onclick="return confirm('¿Quitar a este cliente de la clase?');">
                                            <i class="bi-person-x"></i> Quitar
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${clientesInscritos.empty}">
                                <td colspan="3" class="text-center py-5 text-muted">
                                    <i class="bi-person-dash fs-3 d-block mb-2"></i>
                                    No hay clientes inscritos en esta clase todavía.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <a th:href="@{/admin/clases/}" class="btn btn-light rounded-pill px-4 shadow-sm">
                <i class="bi-arrow-left me-2"></i>Volver a Clases
            </a>
        </div>

    </div>
</section>

<footer class="bg-light py-5 mt-auto">
    <div class="container px-4 px-lg-5">
        <div class="row align-items-center justify-content-center text-center">
            <div class="col-12 mb-3">
                <img th:src="@{/assets/img/UGR-Logo.png}" alt="Logo Universidad de Granada"
                     style="max-height: 70px;" class="img-fluid opacity-75">
            </div>
            <div class="col-12">
                <div class="small text-muted">
                    Copyright &copy; 2026 - UGRFit | El Gimnasio de la Universidad de Granada
                </div>
            </div>
        </div>
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
