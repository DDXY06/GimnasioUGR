<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Usuario - UGRFit Panel</title>

    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css?family=Merriweather+Sans:400,700" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Merriweather:400,300,300italic,400italic,700,700italic" rel="stylesheet" type="text/css" />

    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body id="page-top" class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top py-3" id="mainNav">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand text-primary" th:href="@{/}">UGRFit | Panel de Administración</a>
        <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto my-2 my-lg-0">
                <li class="nav-item"><a class="nav-link text-dark" th:href="@{/admin/usuarios}">Volver a Usuarios</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-section mt-5 pt-5">
    <div class="container px-4 px-lg-5">

        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-lg-8 col-xl-6 text-center">
                <h2 class="mt-0" th:text="${usuario.id == null ? 'Registrar Nuevo Usuario' : 'Editar Usuario'}">Formulario Usuario</h2>
                <hr class="divider mb-5" />
            </div>
        </div>

        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <div class="card border-0 shadow rounded-4 p-4 p-md-5">

                    <div th:if="${error}" class="alert alert-danger rounded-3" role="alert">
                        <i class="bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="form-floating mb-3">
                            <input class="form-control bg-light border-0" id="nombre" type="text" th:field="*{nombre}" placeholder="Nombre Completo" required />
                            <label for="nombre">Nombre Completo</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input class="form-control bg-light border-0" id="dni" type="text" th:field="*{dni}" placeholder="DNI" required />
                            <label for="dni">DNI</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input class="form-control bg-light border-0" id="correo" type="email" th:field="*{correo}" placeholder="correo@correo.ugr.es" required />
                            <label for="correo">Correo Electrónico</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input class="form-control bg-light border-0" id="telf" type="text" th:field="*{telf}" placeholder="Teléfono" />
                            <label for="telf">Teléfono</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input class="form-control bg-light border-0" id="direccion" type="text" th:field="*{direccion}" placeholder="Dirección" />
                            <label for="direccion">Dirección</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input class="form-control bg-light border-0" id="contrasenia" type="text" th:field="*{contrasenia}" placeholder="Contraseña" required />
                            <label for="contrasenia">Contraseña</label>
                        </div>

                        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center mt-4">
                            <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary btn-xl rounded-pill w-100">Cancelar</a>
                            <button type="submit" class="btn btn-primary btn-xl rounded-pill w-100">Guardar</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>

    </div>
</section>

<footer class="bg-light py-5 mt-auto">
    <div class="container px-4 px-lg-5">
        <div class="row align-items-center justify-content-center text-center">
            <div class="col-12 mb-3">
                <img th:src="@{/assets/img/UGR-Logo.png}" alt="Logo Universidad de Granada" style="max-height: 50px;" class="img-fluid opacity-75">
            </div>
            <div class="col-12">
                <div class="small text-muted">Copyright &copy; 2026 - UGRFit Administración</div>
            </div>
        </div>
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
