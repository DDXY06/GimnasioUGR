<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - Gimnasio UGR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Usuarios</h2>
        <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-primary">Añadir Nuevo Usuario</a>
    </div>

    <div class="card shadow mb-4">
        <div class="card-body">
            <form th:action="@{/admin/usuarios}" method="get" class="row g-3 align-items-center">

                <div class="col-auto">
                    <label class="col-form-label">Buscar por:</label>
                </div>

                <div class="col-auto">
                    <select name="tipoFiltro" class="form-select">
                        <option value="nombre" th:selected="${tipoFiltro == 'nombre'}">Nombre</option>
                        <option value="dni" th:selected="${tipoFiltro == 'dni'}">DNI</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <input type="text" name="textoBusqueda" class="form-control"
                           placeholder="Escribe aquí..." th:value="${textoBusqueda}">
                </div>

                <div class="col-auto">
                    <button type="submit" class="btn btn-secondary">Buscar</button>
                    <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary">Limpiar</a>
                </div>

            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>DNI</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nombre}"></td>
                    <td th:text="${u.dni}"></td>
                    <td th:text="${u.correo}"></td>
                    <td>
                        <a th:href="@{/admin/usuarios/{id}/bonos(id=${u.id})}" class="btn btn-sm btn-info text-white">Ver Detalles/Bonos</a>

                        <a th:href="@{/admin/usuarios/editar/{id}(id=${u.id})}" class="btn btn-sm btn-warning">Editar</a>

                        <a th:href="@{/admin/usuarios/eliminar/{id}(id=${u.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Estás seguro de que deseas eliminar este usuario? Todo su historial se borrará.');">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
